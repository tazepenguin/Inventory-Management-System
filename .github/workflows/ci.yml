name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: invms
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        flake8 inventory sales invms --max-line-length=120

    - name: Check formatting with black
      run: |
        black --check inventory sales invms

    - name: Run tests
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost/invms
        SECRET_KEY: dummy-secret-for-ci
        DEBUG: False
        ALLOWED_HOSTS: localhost
      run: |
        python manage.py test

    - name: Security scan with bandit
      run: |
        bandit -r inventory -f json -o bandit-report.json || true