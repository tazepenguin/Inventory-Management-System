{% extends 'inventory/base.html' %}

{% block content %}
<h2>Customers</h2>
<a href="{% url 'customer_add' %}" class="btn btn-primary mb-3">Add Customer</a>
<table class="table">
    <thead>
        <tr><th>Name</th><th>Email</th><th>Phone</th> </tr>
    </thead>
    <tbody>
        {% for c in customers %}
        <tr>
            <td>{{ c.name }}</td>
            <td>{{ c.email }}</td>
            <td>{{ c.phone }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="3">No customers.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
