{% extends 'inventory/base.html' %}

{% block content %}
<h2>Create New Order</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-success">Create Order</button>
    <a href="{% url 'sales_order_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
